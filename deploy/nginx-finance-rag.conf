# ============================================================
# 财务RAG系统 — Nginx 反向代理 + HTTPS 模板
# 作用：对外只暴露 443(HTTPS)，加密传输财务数据；Streamlit 只在本机 8501 监听
# 用法：
#   1) 把本文件放到 /etc/nginx/conf.d/finance-rag.conf（或 sites-available 并软链）
#   2) 替换 server_name 为你的域名/内网主机名
#   3) 准备证书：内网可用自签，公网建议 Let's Encrypt（见文末）
#   4) nginx -t 测试通过后：systemctl reload nginx
#   5) 确认 systemd 里 Streamlit 用 --server.address 127.0.0.1（不再对外裸奔）
# ============================================================

# HTTP → HTTPS 强制跳转
server {
    listen 80;
    server_name finance.example.com;      # ← 改成你的域名/内网主机名
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name finance.example.com;      # ← 同上

    # ---- 证书（改成你的实际路径）----
    ssl_certificate     /etc/nginx/ssl/finance-rag.crt;
    ssl_certificate_key /etc/nginx/ssl/finance-rag.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 财务文件上传：与 Streamlit 默认上限一致，按需调大
    client_max_body_size 200M;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # ---- Streamlit 必需：WebSocket 升级，否则页面一直转圈/频繁断连 ----
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长连接/慢推理不被过早切断
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
    }
}

# ============================================================
# 证书获取参考
# ---- 内网自签（快速起步，浏览器会提示不受信，可手动信任）----
#   mkdir -p /etc/nginx/ssl
#   openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#     -keyout /etc/nginx/ssl/finance-rag.key \
#     -out    /etc/nginx/ssl/finance-rag.crt \
#     -subj "/CN=finance.example.com"
#
# ---- 公网正式证书（推荐 Let's Encrypt）----
#   certbot --nginx -d finance.example.com
# ============================================================
